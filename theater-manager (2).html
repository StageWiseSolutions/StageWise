<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎭 Stage Manager - Musical Theater Production Management</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Sans+Pro:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Source Sans Pro', sans-serif; 
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #e8e8e8;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .notification { 
            animation: slideIn 0.3s ease;
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 4px;
            font-weight: 500;
            z-index: 1000;
            color: #fff;
        }
        .notification.success { background: #27ae60; }
        .notification.error { background: #e74c3c; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #1a1a2e; }
        ::-webkit-scrollbar-thumb { background: #d4af37; border-radius: 4px; }
        select option { background: #1a1a2e; color: #e8e8e8; }
        
        .header {
            background: linear-gradient(90deg, #c9a227 0%, #d4af37 50%, #c9a227 100%);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            box-shadow: 0 4px 20px rgba(201, 162, 39, 0.3);
        }
        .header h1 {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 24px;
            font-weight: 700;
            color: #1a1a2e;
            letter-spacing: 2px;
        }
        .header p {
            font-size: 11px;
            color: #1a1a2e;
            opacity: 0.8;
            margin-top: 2px;
            letter-spacing: 2px;
        }
        .header-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .btn-primary {
            background: #1a1a2e;
            color: #d4af37;
            border: 2px solid #1a1a2e;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 1px;
        }
        .btn-secondary {
            background: transparent;
            color: #1a1a2e;
            border: 2px solid #1a1a2e;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 1px;
        }
        .btn-add {
            background: #d4af37;
            color: #1a1a2e;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            font-family: inherit;
            letter-spacing: 1px;
        }
        .btn-add:hover { background: #e8c252; }
        .btn-update {
            background: #3498db;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            font-family: inherit;
            letter-spacing: 1px;
        }
        .btn-update:hover { background: #5faee3; }
        .btn-cancel {
            background: #7f8c8d;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            font-family: inherit;
            letter-spacing: 1px;
        }
        .btn-cancel:hover { background: #95a5a6; }
        .btn-action {
            background: transparent;
            border: none;
            color: #d4af37;
            cursor: pointer;
            padding: 4px 6px;
            font-size: 14px;
        }
        .btn-action:hover { color: #e8c252; }
        .btn-edit {
            background: transparent;
            border: none;
            color: #3498db;
            cursor: pointer;
            padding: 4px 6px;
            font-size: 14px;
        }
        .btn-edit:hover { color: #5faee3; }
        .btn-delete {
            background: transparent;
            border: none;
            color: #e74c3c;
            cursor: pointer;
            padding: 4px 6px;
            font-size: 14px;
        }
        .btn-delete:hover { color: #ff6b6b; }
        
        .nav {
            background: rgba(26, 26, 46, 0.95);
            padding: 0 15px;
            display: flex;
            gap: 0;
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            overflow-x: auto;
            flex-wrap: nowrap;
        }
        .nav-item {
            padding: 12px 14px;
            cursor: pointer;
            color: #888;
            font-size: 12px;
            font-weight: 500;
            border-bottom: 3px solid transparent;
            white-space: nowrap;
            letter-spacing: 0.5px;
            transition: all 0.2s;
        }
        .nav-item:hover { color: #d4af37; }
        .nav-item.active {
            color: #d4af37;
            border-bottom: 3px solid #d4af37;
        }
        
        .production-selector {
            background: rgba(15, 52, 96, 0.5);
            padding: 12px 30px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
        }
        .production-selector label {
            margin-right: 10px;
            color: #d4af37;
            font-size: 13px;
        }
        
        .main {
            padding: 20px 30px;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .card {
            background: rgba(26, 26, 46, 0.9);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(212, 175, 55, 0.2);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }
        .card.editing {
            border: 2px solid #3498db;
            box-shadow: 0 4px 20px rgba(52, 152, 219, 0.3);
        }
        .card-title {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 18px;
            color: #d4af37;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            font-weight: 600;
        }
        .card-title.editing {
            color: #3498db;
            border-bottom-color: rgba(52, 152, 219, 0.3);
        }
        
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
            margin-bottom: 15px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .form-group.full-width {
            grid-column: 1 / -1;
        }
        .form-group label {
            font-size: 11px;
            color: #d4af37;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            background: #0f3460;
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 4px;
            padding: 8px 10px;
            color: #e8e8e8;
            font-size: 14px;
            font-family: inherit;
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #d4af37;
        }
        .form-group textarea {
            min-height: 70px;
            resize: vertical;
        }
        .form-group select[multiple] {
            min-height: 80px;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: rgba(15, 52, 96, 0.5);
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid rgba(212, 175, 55, 0.2);
        }
        .stat-number {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 28px;
            color: #d4af37;
            font-weight: 700;
        }
        .stat-label {
            font-size: 10px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 4px;
        }
        
        .table-wrapper { overflow-x: auto; }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th {
            background: rgba(212, 175, 55, 0.1);
            padding: 10px 12px;
            text-align: left;
            font-size: 11px;
            color: #d4af37;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid rgba(212, 175, 55, 0.3);
        }
        td {
            padding: 10px 12px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.1);
            font-size: 13px;
        }
        tr:hover { background: rgba(212, 175, 55, 0.05); }
        tr.editing-row { background: rgba(52, 152, 219, 0.1); }
        
        .badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .badge-planning { background: #3498db; color: #fff; }
        .badge-in-rehearsal { background: #f39c12; color: #fff; }
        .badge-tech-week { background: #9b59b6; color: #fff; }
        .badge-performing { background: #27ae60; color: #fff; }
        .badge-closed { background: #7f8c8d; color: #fff; }
        .badge-not-started { background: #95a5a6; color: #fff; }
        .badge-in-progress { background: #f39c12; color: #fff; }
        .badge-polished { background: #27ae60; color: #fff; }
        .badge-present { background: #27ae60; color: #fff; }
        .badge-late { background: #f39c12; color: #fff; }
        .badge-absent { background: #e74c3c; color: #fff; }
        .badge-excused { background: #3498db; color: #fff; }
        .badge-pending { background: #95a5a6; color: #fff; }
        .badge-needed { background: #e74c3c; color: #fff; }
        .badge-acquired { background: #3498db; color: #fff; }
        .badge-built { background: #9b59b6; color: #fff; }
        .badge-ready { background: #27ae60; color: #fff; }
        .badge-draft { background: #95a5a6; color: #fff; }
        .badge-sent { background: #27ae60; color: #fff; }
        
        .called-box {
            background: rgba(39, 174, 96, 0.2);
            padding: 10px;
            border-radius: 4px;
            font-size: 13px;
            border: 1px solid rgba(39, 174, 96, 0.3);
        }
        .email-box {
            background: #0f3460;
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 4px;
            padding: 8px 10px;
            color: #e8e8e8;
            font-size: 12px;
            min-height: 50px;
            word-break: break-all;
            cursor: pointer;
        }
        .email-box:hover { border-color: #d4af37; }
        
        .empty-state {
            color: #888;
            text-align: center;
            padding: 30px;
        }
        .select-production {
            text-align: center;
            color: #d4af37;
        }
        
        footer {
            text-align: center;
            padding: 15px;
            color: #666;
            font-size: 11px;
            border-top: 1px solid rgba(212, 175, 55, 0.1);
        }
        
        .hidden { display: none; }
    </style>
</head>
<body>
    <div id="notification" class="notification hidden"></div>

    <header class="header">
        <div>
            <h1>🎭 Stage Manager</h1>
            <p>Musical Theater Production Management</p>
        </div>
        <div class="header-buttons">
            <label class="btn-secondary" style="cursor: pointer;">
                📥 Import
                <input type="file" id="importFile" accept=".xlsx,.xls" style="display: none;">
            </label>
            <button class="btn-primary" onclick="exportToExcel()">📤 Export</button>
        </div>
    </header>

    <nav class="nav" id="nav">
        <div class="nav-item active" data-tab="productions">🎭 Productions</div>
        <div class="nav-item" data-tab="people">👥 People</div>
        <div class="nav-item" data-tab="scenes">🎬 Scenes</div>
        <div class="nav-item" data-tab="rehearsals">📅 Rehearsals</div>
        <div class="nav-item" data-tab="attendance">✓ Attendance</div>
        <div class="nav-item" data-tab="inventory">🎪 Inventory</div>
        <div class="nav-item" data-tab="budget">💰 Budget</div>
        <div class="nav-item" data-tab="documents">📄 Documents</div>
        <div class="nav-item" data-tab="cueSheets">🎚️ Cues</div>
        <div class="nav-item" data-tab="emails">✉️ Emails</div>
    </nav>

    <div class="production-selector" id="productionSelector" style="display: none;">
        <label>Active Production:</label>
        <select id="activeProductionSelect" onchange="setActiveProduction(this.value)">
            <option value="">Select production...</option>
        </select>
    </div>

    <main class="main" id="mainContent"></main>

    <footer>
        Stage Manager v1.1 • Remember to Export your data to save it!
    </footer>

    <script>
        // Data storage
        let data = {
            productions: [],
            people: [],
            scenes: [],
            rehearsals: [],
            attendance: [],
            inventory: [],
            budget: [],
            documents: [],
            cueSheets: [],
            emails: []
        };

        let activeProduction = null;
        let activeTab = 'productions';
        
        // Edit state tracking
        let editing = {
            production: null,
            person: null,
            scene: null,
            rehearsal: null,
            inventory: null,
            budget: null,
            document: null,
            cueSheet: null,
            email: null
        };

        // Utility functions
        function generateId() {
            return Math.random().toString(36).substr(2, 9);
        }

        function showNotification(message, type = 'success') {
            const notif = document.getElementById('notification');
            notif.textContent = message;
            notif.className = 'notification ' + type;
            setTimeout(() => notif.className = 'notification hidden', 3000);
        }

        function getBadgeClass(status) {
            const map = {
                'Planning': 'badge-planning',
                'In Rehearsal': 'badge-in-rehearsal',
                'Tech Week': 'badge-tech-week',
                'Performing': 'badge-performing',
                'Closed': 'badge-closed',
                'Not Started': 'badge-not-started',
                'In Progress': 'badge-in-progress',
                'Polished': 'badge-polished',
                'Present': 'badge-present',
                'Late': 'badge-late',
                'Absent': 'badge-absent',
                'Excused': 'badge-excused',
                'Pending': 'badge-pending',
                'Needed': 'badge-needed',
                'Acquired': 'badge-acquired',
                'Built': 'badge-built',
                'Ready': 'badge-ready',
                'Draft': 'badge-draft',
                'Sent': 'badge-sent'
            };
            return map[status] || 'badge-pending';
        }

        function getProductionData(collection) {
            if (!activeProduction) return [];
            return data[collection].filter(item => item.productionId === activeProduction);
        }

        function getCalledCast(sceneIds) {
            const scenes = data.scenes.filter(s => sceneIds.includes(s.id));
            const castIds = new Set();
            scenes.forEach(s => (s.castIds || []).forEach(id => castIds.add(id)));
            return Array.from(castIds);
        }

        // Navigation
        document.getElementById('nav').addEventListener('click', function(e) {
            if (e.target.classList.contains('nav-item')) {
                // Clear all edit states when switching tabs
                Object.keys(editing).forEach(key => editing[key] = null);
                
                document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
                e.target.classList.add('active');
                activeTab = e.target.dataset.tab;
                renderContent();
            }
        });

        function setActiveProduction(id) {
            activeProduction = id || null;
            // Clear edit states when changing production
            Object.keys(editing).forEach(key => editing[key] = null);
            renderContent();
        }

        function updateProductionSelector() {
            const select = document.getElementById('activeProductionSelect');
            select.innerHTML = '<option value="">Select production...</option>';
            data.productions.forEach(p => {
                select.innerHTML += `<option value="${p.id}" ${p.id === activeProduction ? 'selected' : ''}>${p.title}</option>`;
            });
        }

        // Cancel edit functions
        function cancelEdit(type) {
            editing[type] = null;
            renderContent();
        }

        // Render functions
        function renderContent() {
            const main = document.getElementById('mainContent');
            const selector = document.getElementById('productionSelector');
            
            selector.style.display = activeTab === 'productions' ? 'none' : 'block';
            updateProductionSelector();

            switch(activeTab) {
                case 'productions': main.innerHTML = renderProductions(); break;
                case 'people': main.innerHTML = renderPeople(); break;
                case 'scenes': main.innerHTML = renderScenes(); break;
                case 'rehearsals': main.innerHTML = renderRehearsals(); break;
                case 'attendance': main.innerHTML = renderAttendance(); break;
                case 'inventory': main.innerHTML = renderInventory(); break;
                case 'budget': main.innerHTML = renderBudget(); break;
                case 'documents': main.innerHTML = renderDocuments(); break;
                case 'cueSheets': main.innerHTML = renderCueSheets(); break;
                case 'emails': main.innerHTML = renderEmails(); break;
            }
        }

        // ==================== PRODUCTIONS ====================
        function renderProductions() {
            const isEditing = editing.production !== null;
            const editItem = isEditing ? data.productions.find(p => p.id === editing.production) : null;

            let tableRows = data.productions.map(p => `
                <tr class="${editing.production === p.id ? 'editing-row' : ''}">
                    <td><strong>${p.title}</strong></td>
                    <td>${p.venue || ''}</td>
                    <td>${p.startDate || ''} - ${p.endDate || ''}</td>
                    <td>${p.director || ''}</td>
                    <td><span class="badge ${getBadgeClass(p.status)}">${p.status}</span></td>
                    <td>
                        <button class="btn-edit" onclick="editProduction('${p.id}')" title="Edit">✏️</button>
                        <button class="btn-action" onclick="selectProduction('${p.id}')" title="Select">📋</button>
                        <button class="btn-delete" onclick="deleteProduction('${p.id}')" title="Delete">🗑️</button>
                    </td>
                </tr>
            `).join('');

            return `
                <div class="card ${isEditing ? 'editing' : ''}">
                    <h3 class="card-title ${isEditing ? 'editing' : ''}">${isEditing ? '✏️ Edit Production' : 'Add New Production'}</h3>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Title *</label>
                            <input type="text" id="prod_title" placeholder="Show name" value="${isEditing ? editItem.title : ''}">
                        </div>
                        <div class="form-group">
                            <label>Venue</label>
                            <input type="text" id="prod_venue" value="${isEditing ? editItem.venue || '' : ''}">
                        </div>
                        <div class="form-group">
                            <label>Start Date</label>
                            <input type="date" id="prod_startDate" value="${isEditing ? editItem.startDate || '' : ''}">
                        </div>
                        <div class="form-group">
                            <label>End Date</label>
                            <input type="date" id="prod_endDate" value="${isEditing ? editItem.endDate || '' : ''}">
                        </div>
                        <div class="form-group">
                            <label>Director</label>
                            <input type="text" id="prod_director" value="${isEditing ? editItem.director || '' : ''}">
                        </div>
                        <div class="form-group">
                            <label>Music Director</label>
                            <input type="text" id="prod_musicDirector" value="${isEditing ? editItem.musicDirector || '' : ''}">
                        </div>
                        <div class="form-group">
                            <label>Choreographer</label>
                            <input type="text" id="prod_choreographer" value="${isEditing ? editItem.choreographer || '' : ''}">
                        </div>
                        <div class="form-group">
                            <label>Stage Manager</label>
                            <input type="text" id="prod_stageManager" value="${isEditing ? editItem.stageManager || '' : ''}">
                        </div>
                        <div class="form-group">
                            <label>Status</label>
                            <select id="prod_status">
                                <option ${isEditing && editItem.status === 'Planning' ? 'selected' : ''}>Planning</option>
                                <option ${isEditing && editItem.status === 'In Rehearsal' ? 'selected' : ''}>In Rehearsal</option>
                                <option ${isEditing && editItem.status === 'Tech Week' ? 'selected' : ''}>Tech Week</option>
                                <option ${isEditing && editItem.status === 'Performing' ? 'selected' : ''}>Performing</option>
                                <option ${isEditing && editItem.status === 'Closed' ? 'selected' : ''}>Closed</option>
                            </select>
                        </div>
                        <div class="form-group full-width">
                            <label>Synopsis</label>
                            <textarea id="prod_synopsis" placeholder="Brief description...">${isEditing ? editItem.synopsis || '' : ''}</textarea>
                        </div>
                    </div>
                    <div class="button-group">
                        ${isEditing ? `
                            <button class="btn-update" onclick="saveProduction()">💾 Update Production</button>
                            <button class="btn-cancel" onclick="cancelEdit('production')">Cancel</button>
                        ` : `
                            <button class="btn-add" onclick="addProduction()">+ Add Production</button>
                        `}
                    </div>
                </div>

                <div class="card">
                    <h3 class="card-title">All Productions (${data.productions.length})</h3>
                    ${data.productions.length === 0 ? 
                        '<p class="empty-state">No productions yet. Add your first one above!</p>' :
                        `<div class="table-wrapper">
                            <table>
                                <thead>
                                    <tr>
                                        <th>Title</th>
                                        <th>Venue</th>
                                        <th>Dates</th>
                                        <th>Director</th>
                                        <th>Status</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody>${tableRows}</tbody>
                            </table>
                        </div>`
                    }
                </div>
            `;
        }

        function addProduction() {
            const title = document.getElementById('prod_title').value.trim();
            if (!title) return showNotification('Please enter a title', 'error');

            data.productions.push({
                id: generateId(),
                title: title,
                venue: document.getElementById('prod_venue').value,
                startDate: document.getElementById('prod_startDate').value,
                endDate: document.getElementById('prod_endDate').value,
                director: document.getElementById('prod_director').value,
                musicDirector: document.getElementById('prod_musicDirector').value,
                choreographer: document.getElementById('prod_choreographer').value,
                stageManager: document.getElementById('prod_stageManager').value,
                status: document.getElementById('prod_status').value,
                synopsis: document.getElementById('prod_synopsis').value
            });
            showNotification('Production added!');
            renderContent();
        }

        function editProduction(id) {
            editing.production = id;
            renderContent();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function saveProduction() {
            const title = document.getElementById('prod_title').value.trim();
            if (!title) return showNotification('Please enter a title', 'error');

            const item = data.productions.find(p => p.id === editing.production);

        function loadAttendance() {
            const rehearsalId = document.getElementById('att_rehearsal').value;
            const container = document.getElementById('attendanceTable');
            
            if (!rehearsalId) {
                container.innerHTML = '<p class="empty-state">Select a rehearsal above.</p>';
                return;
            }

            const rehearsal = data.rehearsals.find(r => r.id === rehearsalId);
            const people = getProductionData('people');
            const calledPeople = people.filter(p => (rehearsal.calledCastIds || []).includes(p.id));

            if (calledPeople.length === 0) {
                container.innerHTML = '<p class="empty-state">No one called for this rehearsal.</p>';
                return;
            }

            let rows = calledPeople.map(p => {
                const record = data.attendance.find(a => a.rehearsalId === rehearsalId && a.personId === p.id);
                const status = record ? record.status : 'Pending';

                return `
                    <tr>
                        <td><strong>${p.firstName} ${p.lastName}</strong></td>
                        <td>${p.character || ''}</td>
                        <td><span class="badge ${getBadgeClass(status)}">${status}</span></td>
                        <td>
                            <button class="btn-action" style="color:#27ae60" onclick="setAttendance('${rehearsalId}','${p.id}','Present')">✓</button>
                            <button class="btn-action" style="color:#f39c12" onclick="setAttendance('${rehearsalId}','${p.id}','Late')">⏰</button>
                            <button class="btn-action" style="color:#e74c3c" onclick="setAttendance('${rehearsalId}','${p.id}','Absent')">✗</button>
                            <button class="btn-action" style="color:#3498db" onclick="setAttendance('${rehearsalId}','${p.id}','Excused')">E</button>
                        </td>
                    </tr>
                `;
            }).join('');

            container.innerHTML = `
                <div class="table-wrapper" style="margin-top:15px">
                    <table>
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Character</th>

            const existing = data.attendance.find(a => a.rehearsalId === rehearsalId && a.personId === personId);

                            <input type="text" id="cue_page" value="${isEditing ? editItem.page || '' : ''}">
                        </div>
                        <div class="form-group">
                            <label>Action/Trigger</label>
                            <input type="text" id="cue_action" placeholder="On line..." value="${isEditing ? editItem.action || '' : ''}">
                        </div>
                        <div class="form-group full-width">
                            <label>Description *</label>
                            <textarea id="cue_description">${isEditing ? editItem.description : ''}</textarea>
                        </div>
                        <div class="form-group full-width">
                            <label>Notes</label>
                            <textarea id="cue_notes">${isEditing ? editItem.notes || '' : ''}</textarea>
                        </div>
                    </div>
                    <div class="button-group">
                        ${isEditing ? `
                            <button class="btn-update" onclick="saveCue()">💾 Update Cue</button>
                            <button class="btn-cancel" onclick="cancelEdit('cueSheet')">Cancel</button>
                        ` : `
                            <button class="btn-add" onclick="addCue()">+ Add Cue</button>
                        `}
                    </div>
                </div>

                <div class="card">
                    <h3 class="card-title">Cue Sheets (${cueSheets.length})</h3>
                    ${cueSheets.length === 0 ? 
                        '<p class="empty-state">No cues yet.</p>' :
                        `<div class="table-wrapper">
                            <table>
                                <thead>
                                    <tr>
                                        <th>Type</th>
                                        <th>Cue #</th>
                                        <th>Page</th>
                                        <th>Action</th>
                                        <th>Description</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody>${tableRows}</tbody>
                            </table>
                        </div>`
                    }
                </div>
            `;
        }

        function addCue() {
            const cueNumber = document.getElementById('cue_number').value.trim();
            const description = document.getElementById('cue_description').value.trim();
            if (!cueNumber || !description) return showNotification('Enter cue # and description', 'error');

            data.cueSheets.push({
                id: generateId(),
                productionId: activeProduction,
                type: document.getElementById('cue_type').value,
                cueNumber: cueNumber,
                page: document.getElementById('cue_page').value,
                action: document.getElementById('cue_action').value,
                description: description,
                notes: document.getElementById('cue_notes').value
            });
            showNotification('Cue added!');
            renderContent();
        }

        function editCue(id) {
            editing.cueSheet = id;
            renderContent();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function saveCue() {
            const cueNumber = document.getElementById('cue_number').value.trim();
            const description = document.getElementById('cue_description').value.trim();
            if (!cueNumber || !description) return showNotification('Enter cue # and description', 'error');

            const item = data.cueSheets.find(c => c.id === editing.cueSheet);
            if (item) {
                item.type = document.getElementById('cue_type').value;
                item.cueNumber = cueNumber;
                item.page = document.getElementById('cue_page').value;
                item.action = document.getElementById('cue_action').value;
                item.description = description;
                item.notes = document.getElementById('cue_notes').value;
            }
            editing.cueSheet = null;
            showNotification('Cue updated!');
            renderContent();
        }

        function deleteCue(id) {
            if (confirm('Delete this cue?')) {
                data.cueSheets = data.cueSheets.filter(c => c.id !== id);
                if (editing.cueSheet === id) editing.cueSheet = null;
                renderContent();
            }
        }

        // ==================== EMAILS ====================
        function renderEmails() {
            if (!activeProduction) return '<div class="card"><p class="select-production">⬆️ Please select a production first</p></div>';

            const emails = getProductionData('emails');
            const rehearsals = getProductionData('rehearsals');
            const isEditing = editing.email !== null;
            const editItem = isEditing ? emails.find(e => e.id === editing.email) : null;

            let rehearsalOptions = rehearsals.map(r => 
                `<option value="${r.id}">${r.date} - ${r.startTime}</option>`
            ).join('');

            let tableRows = emails.map(e => `
                <tr class="${editing.email === e.id ? 'editing-row' : ''}">
                    <td>${e.dateCreated}</td>
                    <td><strong>${e.subject}</strong></td>
                    <td><span class="badge ${getBadgeClass(e.status)}">${e.status}</span></td>
                    <td>
                        <button class="btn-edit" onclick="editEmail('${e.id}')" title="Edit">✏️</button>
                        <button class="btn-action" onclick="copyEmail('${e.id}')" title="Copy">📋</button>
                        <button class="btn-delete" onclick="deleteEmail('${e.id}')" title="Delete">🗑️</button>
                    </td>
                </tr>
            `).join('');

            return `
                <div class="card ${isEditing ? 'editing' : ''}">
                    <h3 class="card-title ${isEditing ? 'editing' : ''}">${isEditing ? '✏️ Edit Email' : 'Compose Email'}</h3>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Recipients</label>
                            <select id="email_recipientType" onchange="updateEmailRecipients()">
                                <option value="all">All Company</option>
                                <option value="cast">Cast Only</option>
                                <option value="crew">Crew Only</option>
                                <option value="rehearsal">Called for Rehearsal</option>
                            </select>
                        </div>
                        <div class="form-group" id="rehearsalSelectGroup" style="display:none">
                            <label>Rehearsal</label>
                            <select id="email_rehearsal" onchange="updateEmailRecipients()">
                                <option value="">Choose...</option>
                                ${rehearsalOptions}
                            </select>
                        </div>
                        <div class="form-group full-width">
                            <label>Email Addresses (click to copy)</label>
                            <div class="email-box" id="emailAddressBox" onclick="copyEmailAddresses()">Loading...</div>
                        </div>
                        <div class="form-group full-width">
                            <label>Subject *</label>
                            <input type="text" id="email_subject" value="${isEditing ? editItem.subject : ''}">
                        </div>
                        <div class="form-group full-width">
                            <label>Body *</label>
                            <textarea id="email_body" style="min-height:120px">${isEditing ? editItem.body : ''}</textarea>
                        </div>
                    </div>
                    <div class="button-group">
                        ${isEditing ? `
                            <button class="btn-update" onclick="saveEmail()">💾 Update Email</button>
                            <button class="btn-cancel" onclick="cancelEdit('email')">Cancel</button>
                        ` : `
                            <button class="btn-add" onclick="addEmail()">💾 Save Draft</button>
                        `}
                        <button class="btn-add" style="background:#27ae60" onclick="copyFullEmail()">📋 Copy Email</button>
                    </div>
                </div>

                <div class="card">
                    <h3 class="card-title">Saved Emails (${emails.length})</h3>
                    ${emails.length === 0 ? 
                        '<p class="empty-state">No emails yet.</p>' :
                        `<div class="table-wrapper">
                            <table>
                                <thead>
                                    <tr>
                                        <th>Date</th>
                                        <th>Subject</th>
                                        <th>Status</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody>${tableRows}</tbody>
                            </table>
                        </div>`
                    }
                </div>
            `;
        }

        function updateEmailRecipients() {
            const type = document.getElementById('email_recipientType').value;
            const rehearsalGroup = document.getElementById('rehearsalSelectGroup');
            if (rehearsalGroup) rehearsalGroup.style.display = type === 'rehearsal' ? 'block' : 'none';

            const people = getProductionData('people');
            let recipients = [];

            if (type === 'all') {
                recipients = people.filter(p => p.email);
            } else if (type === 'cast') {
                recipients = people.filter(p => p.email && p.role && p.role.includes('Cast'));
            } else if (type === 'crew') {
                recipients = people.filter(p => p.email && (!p.role || !p.role.includes('Cast')));
            } else if (type === 'rehearsal') {
                const rehearsalSelect = document.getElementById('email_rehearsal');
                const rehearsalId = rehearsalSelect ? rehearsalSelect.value : '';
                if (rehearsalId) {
                    const rehearsal = data.rehearsals.find(r => r.id === rehearsalId);
                    if (rehearsal) {
                        recipients = people.filter(p => p.email && (rehearsal.calledCastIds || []).includes(p.id));
                    }
                }
            }

            const emailsText = recipients.map(p => p.email).join(', ');
            const box = document.getElementById('emailAddressBox');
            if (box) box.textContent = emailsText || 'No emails found';
        }

        function copyEmailAddresses() {
            const text = document.getElementById('emailAddressBox').textContent;
            navigator.clipboard.writeText(text);
            showNotification('Copied!');
        }

        function copyFullEmail() {
            const subject = document.getElementById('email_subject').value;
            const body = document.getElementById('email_body').value;
            navigator.clipboard.writeText(`Subject: ${subject}\n\n${body}`);
            showNotification('Email copied!');
        }

        function addEmail() {
            const subject = document.getElementById('email_subject').value.trim();
            const body = document.getElementById('email_body').value.trim();
            if (!subject || !body) return showNotification('Enter subject and body', 'error');

            data.emails.push({
                id: generateId(),
                productionId: activeProduction,
                subject: subject,
                body: body,
                recipients: document.getElementById('emailAddressBox').textContent,
                dateCreated: new Date().toISOString().split('T')[0],
                status: 'Draft'
            });
            showNotification('Saved!');
            renderContent();
        }

        function editEmail(id) {
            editing.email = id;
            renderContent();
            window.scrollTo({ top: 0, behavior: 'smooth' });
            setTimeout(updateEmailRecipients, 100);
        }

        function saveEmail() {
            const subject = document.getElementById('email_subject').value.trim();
            const body = document.getElementById('email_body').value.trim();
            if (!subject || !body) return showNotification('Enter subject and body', 'error');

            const item = data.emails.find(e => e.id === editing.email);
            if (item) {
                item.subject = subject;
                item.body = body;
                item.recipients = document.getElementById('emailAddressBox').textContent;
            }
            editing.email = null;
            showNotification('Email updated!');
            renderContent();
        }

        function copyEmail(id) {
            const email = data.emails.find(e => e.id === id);
            if (email) {
                navigator.clipboard.writeText(`Subject: ${email.subject}\n\n${email.body}`);
                showNotification('Copied!');
            }
        }

        function deleteEmail(id) {
            if (confirm('Delete this email?')) {
                data.emails = data.emails.filter(e => e.id !== id);
                if (editing.email === id) editing.email = null;
                renderContent();
            }
        }

        // ==================== EXCEL IMPORT/EXPORT ====================
        function exportToExcel() {
            const wb = XLSX.utils.book_new();
            
            const productionsData = data.productions.map(p => ({
                ID: p.id, Title: p.title, Venue: p.venue, StartDate: p.startDate, EndDate: p.endDate,
                Synopsis: p.synopsis, Director: p.director, MusicDirector: p.musicDirector,
                Choreographer: p.choreographer, StageManager: p.stageManager, Status: p.status
            }));
            XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(productionsData), 'Productions');

            const peopleData = data.people.map(p => ({
                ID: p.id, ProductionID: p.productionId, FirstName: p.firstName, LastName: p.lastName,
                Email: p.email, Phone: p.phone, EmergencyContact: p.emergencyContact,
                EmergencyPhone: p.emergencyPhone, Role: p.role, Character: p.character, Notes: p.notes
            }));
            XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(peopleData), 'People');

            const scenesData = data.scenes.map(s => ({
                ID: s.id, ProductionID: s.productionId, SceneNumber: s.sceneNumber, Title: s.title,
                Act: s.act, Description: s.description, Status: s.status, CastIDs: (s.castIds || []).join(','), Notes: s.notes
            }));
            XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(scenesData), 'Scenes');

            const rehearsalsData = data.rehearsals.map(r => ({
                ID: r.id, ProductionID: r.productionId, Date: r.date, StartTime: r.startTime, EndTime: r.endTime,
                Location: r.location, Type: r.type, SceneIDs: (r.sceneIds || []).join(','),
                CalledCastIDs: (r.calledCastIds || []).join(','), Notes: r.notes
            }));
            XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(rehearsalsData), 'Rehearsals');

            const attendanceData = data.attendance.map(a => ({
                ID: a.id, RehearsalID: a.rehearsalId, PersonID: a.personId, Status: a.status,
                ArrivalTime: a.arrivalTime, Notes: a.notes
            }));
            XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(attendanceData), 'Attendance');

            const inventoryData = data.inventory.map(i => ({
                ID: i.id, ProductionID: i.productionId, Category: i.category, Name: i.name,
                Description: i.description, SceneIDs: (i.sceneIds || []).join(','),
                CharacterIDs: (i.characterIds || []).join(','), Status: i.status, Notes: i.notes, Cost: i.cost
            }));
            XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(inventoryData), 'Inventory');

            const budgetData = data.budget.map(b => ({
                ID: b.id, ProductionID: b.productionId, Category: b.category, Description: b.description,
                PlannedAmount: b.plannedAmount, ActualAmount: b.actualAmount, Date: b.date, Vendor: b.vendor, Notes: b.notes
            }));
            XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(budgetData), 'Budget');

            const documentsData = data.documents.map(d => ({
                ID: d.id, ProductionID: d.productionId, Title: d.title, Category: d.category,
                URL: d.url, Version: d.version, Notes: d.notes, DateAdded: d.dateAdded
            }));
            XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(documentsData), 'Documents');

            const cueSheetsData = data.cueSheets.map(c => ({
                ID: c.id, ProductionID: c.productionId, Type: c.type, CueNumber: c.cueNumber,
                Page: c.page, Action: c.action, Description: c.description, Notes: c.notes
            }));
            XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(cueSheetsData), 'CueSheets');

            const emailsData = data.emails.map(e => ({
                ID: e.id, ProductionID: e.productionId, Subject: e.subject, Body: e.body,
                Recipients: e.recipients, DateCreated: e.dateCreated, Status: e.status
            }));
            XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(emailsData), 'Emails');

            XLSX.writeFile(wb, 'TheaterProductionData.xlsx');
            showNotification('Exported to Excel!');
        }

        document.getElementById('importFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(evt) {
                try {
                    const wb = XLSX.read(evt.target.result, { type: 'binary' });
                    
                    if (wb.SheetNames.includes('Productions')) {
                        data.productions = XLSX.utils.sheet_to_json(wb.Sheets['Productions']).map(r => ({
                            id: r.ID || generateId(), title: r.Title || '', venue: r.Venue || '',
                            startDate: r.StartDate || '', endDate: r.EndDate || '', synopsis: r.Synopsis || '',
                            director: r.Director || '', musicDirector: r.MusicDirector || '',
                            choreographer: r.Choreographer || '', stageManager: r.StageManager || '', status: r.Status || 'Planning'
                        }));
                    }

                    if (wb.SheetNames.includes('People')) {
                        data.people = XLSX.utils.sheet_to_json(wb.Sheets['People']).map(r => ({
                            id: r.ID || generateId(), productionId: r.ProductionID || '',
                            firstName: r.FirstName || '', lastName: r.LastName || '', email: r.Email || '',
                            phone: r.Phone || '', emergencyContact: r.EmergencyContact || '',
                            emergencyPhone: r.EmergencyPhone || '', role: r.Role || '', character: r.Character || '', notes: r.Notes || ''
                        }));
                    }

                    if (wb.SheetNames.includes('Scenes')) {
                        data.scenes = XLSX.utils.sheet_to_json(wb.Sheets['Scenes']).map(r => ({
                            id: r.ID || generateId(), productionId: r.ProductionID || '',
                            sceneNumber: r.SceneNumber || '', title: r.Title || '', act: r.Act || '',
                            description: r.Description || '', status: r.Status || 'Not Started',
                            castIds: r.CastIDs ? String(r.CastIDs).split(',').filter(Boolean) : [], notes: r.Notes || ''
                        }));
                    }

                    if (wb.SheetNames.includes('Rehearsals')) {
                        data.rehearsals = XLSX.utils.sheet_to_json(wb.Sheets['Rehearsals']).map(r => ({
                            id: r.ID || generateId(), productionId: r.ProductionID || '',
                            date: r.Date || '', startTime: r.StartTime || '', endTime: r.EndTime || '',
                            location: r.Location || '', type: r.Type || '',
                            sceneIds: r.SceneIDs ? String(r.SceneIDs).split(',').filter(Boolean) : [],
                            calledCastIds: r.CalledCastIDs ? String(r.CalledCastIDs).split(',').filter(Boolean) : [], notes: r.Notes || ''
                        }));
                    }

                    if (wb.SheetNames.includes('Attendance')) {
                        data.attendance = XLSX.utils.sheet_to_json(wb.Sheets['Attendance']).map(r => ({
                            id: r.ID || generateId(), rehearsalId: r.RehearsalID || '', personId: r.PersonID || '',
                            status: r.Status || 'Pending', arrivalTime: r.ArrivalTime || '', notes: r.Notes || ''
                        }));
                    }

                    if (wb.SheetNames.includes('Inventory')) {
                        data.inventory = XLSX.utils.sheet_to_json(wb.Sheets['Inventory']).map(r => ({
                            id: r.ID || generateId(), productionId: r.ProductionID || '', category: r.Category || '',
                            name: r.Name || '', description: r.Description || '',
                            sceneIds: r.SceneIDs ? String(r.SceneIDs).split(',').filter(Boolean) : [],
                            characterIds: r.CharacterIDs ? String(r.CharacterIDs).split(',').filter(Boolean) : [],
                            status: r.Status || 'Needed', notes: r.Notes || '', cost: r.Cost || 0
                        }));
                    }

                    if (wb.SheetNames.includes('Budget')) {
                        data.budget = XLSX.utils.sheet_to_json(wb.Sheets['Budget']).map(r => ({
                            id: r.ID || generateId(), productionId: r.ProductionID || '', category: r.Category || '',
                            description: r.Description || '', plannedAmount: r.PlannedAmount || 0,
                            actualAmount: r.ActualAmount || 0, date: r.Date || '', vendor: r.Vendor || '', notes: r.Notes || ''
                        }));
                    }

                    if (wb.SheetNames.includes('Documents')) {
                        data.documents = XLSX.utils.sheet_to_json(wb.Sheets['Documents']).map(r => ({
                            id: r.ID || generateId(), productionId: r.ProductionID || '', title: r.Title || '',
                            category: r.Category || '', url: r.URL || '', version: r.Version || '1.0',
                            notes: r.Notes || '', dateAdded: r.DateAdded || ''
                        }));
                    }

                    if (wb.SheetNames.includes('CueSheets')) {
                        data.cueSheets = XLSX.utils.sheet_to_json(wb.Sheets['CueSheets']).map(r => ({
                            id: r.ID || generateId(), productionId: r.ProductionID || '', type: r.Type || '',
                            cueNumber: r.CueNumber || '', page: r.Page || '', action: r.Action || '',
                            description: r.Description || '', notes: r.Notes || ''
                        }));
                    }

                    if (wb.SheetNames.includes('Emails')) {
                        data.emails = XLSX.utils.sheet_to_json(wb.Sheets['Emails']).map(r => ({
                            id: r.ID || generateId(), productionId: r.ProductionID || '', subject: r.Subject || '',
                            body: r.Body || '', recipients: r.Recipients || '', dateCreated: r.DateCreated || '', status: r.Status || 'Draft'
                        }));
                    }

                    if (data.productions.length > 0) {
                        activeProduction = data.productions[0].id;
                    }

                    showNotification('Imported from Excel!');
                    renderContent();
                } catch (error) {
                    showNotification('Error importing: ' + error.message, 'error');
                }
            };
            reader.readAsBinaryString(file);
            e.target.value = '';
        });

        // Initialize
        renderContent();

        // Update email recipients when emails tab loads
        const originalRenderContent = renderContent;
        renderContent = function() {
            originalRenderContent();
            if (activeTab === 'emails' && activeProduction) {
                setTimeout(updateEmailRecipients, 0);
            }
        };
    </script>
</body>
</html>
